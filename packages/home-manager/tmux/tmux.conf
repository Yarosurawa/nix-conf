
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=#52072b'
set -g pane-active-border-style 'fg=#eb146b'

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style 'fg=#eb146b'

set -g status-left ''
set -g status-left-length 10

setw -g window-status-current-style 'fg=black bg=#eb146b'
setw -g window-status-current-format ' #I #W #F '

setw -g status-right-style 'fg=#1FEC99'

setw -g window-status-style 'bg=black fg=#eb146b'
setw -g window-status-format ' #I #[fg=white]#W #[fg=#1FEC99]#F '

setw -g window-status-bell-style 'fg=#1FEC99 bg=#eb146b bold'

# messages
set -g message-style 'fg=black bg=#eb146b bold'
